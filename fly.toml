# fly.toml app configuration file for DeepSeek Bot

app = "your-app-name"  # O'zgartiring: sizning app nomingiz

primary_region = "ams"  # Amsterdam (Europe) - yoki sizga yaqin region

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  # Environment variables Fly.io dashboardda o'rnatiladi

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false  # Bot doim ishlashi uchun
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 8080
  
  [[services.ports]]
    port = 80
    handlers = ["http"]
    
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"  # Bepul reja uchun yetarli
  cpu_kind = "shared"
  cpus = 1
